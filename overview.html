<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ResearchGraph</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:calc(100vh / 1.4);display:flex;flex-direction:column;overflow:hidden;background:#f1f5f9;color:#1e293b;zoom:1.4}

/* ── HEADER ── */
#hdr{background:#1e3a5f;color:#fff;padding:9px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:700;letter-spacing:.5px}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.2px;cursor:pointer;
  transition:opacity .15s,box-shadow .15s;user-select:none}
.pill:hover{opacity:.85}
.pill.pill-active{box-shadow:0 0 0 2px #fff}
.p-done{background:#bfdbfe;color:#1e3a8a}
.p-wip{background:#fed7aa;color:#7c2d12}
.p-open{background:#e9d5ff;color:#4c1d95}
.goal-block.dimmed{opacity:.25;pointer-events:none;transition:opacity .2s}
#hdr .spacer{flex:1}
.hdr-btn{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:11px;font-weight:600;padding:4px 11px;border-radius:6px;cursor:pointer;letter-spacing:.2px}
.hdr-btn:hover{background:rgba(255,255,255,.22)}

/* ── MAIN ── */
#main{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── ROADMAP ── */
#roadmap{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 24px;display:flex;flex-direction:column;gap:0}

/* ── DRAG DIVIDER ── */
#drag-divider{width:5px;background:#e2e8f0;cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative}
#drag-divider:hover,#drag-divider.dragging{background:#94a3b8}
#drag-divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:1px;height:32px;background:#cbd5e1;border-radius:2px}

/* ── GOAL BLOCK ── */
.goal-block{display:flex;flex-direction:column;gap:0;margin-bottom:4px}
.goal-header{border-radius:12px;padding:0 20px 0 0;cursor:pointer;border:3px solid transparent;
  transition:box-shadow .15s;display:flex;align-items:stretch;gap:8px;min-height:72px;overflow:hidden}
.goal-header:hover{box-shadow:0 2px 12px rgba(0,0,0,.1)}
.goal-header.selected{box-shadow:0 0 0 3px #3b82f6 !important}
.goal-done{background:#dbeafe;border-color:#3b82f6}
.goal-wip{background:#fed7aa;border-color:#f59e0b}
.goal-icon{font-size:26px;flex-shrink:0}
.goal-title{font-size:18px;font-weight:800}
.goal-exp{font-size:13px;color:#475569;font-style:italic;margin-top:3px}
.goal-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.caret{width:38px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:24px;color:#64748b;background:transparent;border:none;cursor:pointer;transition:color .15s;margin:0;padding:0}
.caret:hover{color:#1e293b}
.goal-divider{width:2px;flex-shrink:0;background:rgba(0,0,0,.12)}
.caret.closed{transform:rotate(-90deg)}
.goal-icon,.goal-title,.goal-exp,.goal-right{align-self:center}
.stat-chips{display:flex;gap:4px;align-items:center}
.sc{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap}
.sc-v{background:#d1fae5;color:#065f46}
.sc-w{background:#fef3c7;color:#92400e}
.sc-o{background:#f1f5f9;color:#64748b}

/* ── GOAL BODY ── */
.goal-body{display:flex;flex-direction:column;gap:10px;padding:10px 0 10px 16px;border-left:3px solid #e2e8f0;margin-left:22px}
.goal-body.hidden{display:none}

/* ── RG GROUPS ── */
.rg-group{display:flex;flex-direction:column;margin-bottom:6px;position:relative}
.rg-group:not(.depth-1){margin-left:24px;padding-left:12px;border-left:2px solid #cbd5e1}
.rg-group-hdr{display:flex;align-items:center;gap:6px;padding:6px 10px;
  background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px 8px 0 0;user-select:none}
.rg-group-hdr:hover{background:#f1f5f9}
.rg-group:not(.depth-1) .rg-group-hdr{background:#f8fafc;border-radius:6px 6px 0 0;border-left:3px solid #94a3b8}
.rg-group-label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#475569;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rg-group:not(.depth-1) .rg-group-label{font-size:9px;color:#64748b}
.ag-caret{font-size:20px;color:#94a3b8;flex-shrink:0;transition:transform .15s;border:none;background:none;cursor:pointer;padding:0}
.ag-caret.closed{transform:rotate(-90deg)}
.ag-summary{display:flex;gap:4px}
.ag-s{font-size:9px;font-weight:700;padding:1px 6px;border-radius:6px}
.ag-s-v{background:#d1fae5;color:#065f46}
.ag-s-w{background:#fef3c7;color:#92400e}
.ag-s-o{background:#f1f5f9;color:#64748b}
.rg-group-actions{display:none;gap:3px;align-items:center;margin-left:4px}
.rg-group-hdr:hover .rg-group-actions{display:flex}
.rg-group-btn{font-size:10px;padding:1px 6px;border-radius:4px;border:none;background:rgba(0,0,0,.07);cursor:pointer;color:#475569;line-height:1.5}
.rg-group-btn:hover{background:rgba(0,0,0,.13)}
.rg-group-btn.danger{color:#dc2626;background:rgba(220,38,38,.08)}
.rg-group-btn.danger:hover{background:rgba(220,38,38,.15)}

/* ── ELEMENT ROW (Drop-Zone) ── */
.rg-el-row{display:flex;flex-wrap:wrap;gap:8px;padding:8px 10px;
  border:1px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;
  background:#fff;min-height:42px;align-items:flex-start}
.rg-el-row.hidden{display:none}
.rg-el-row.dnd-over{background:#eff6ff;border-color:#3b82f6;outline:2px dashed #93c5fd}
.ghost-add{width:138px;border:2px dashed #cbd5e1;border-radius:8px;padding:8px 10px;
  background:transparent;color:rgba(148,163,184,.5);text-align:center;font-size:13px;
  opacity:0;transition:opacity .2s;cursor:pointer;display:flex;align-items:center;justify-content:center;min-height:42px}
.rg-el-row:hover .ghost-add{opacity:1}
.ghost-add:hover{border-color:#94a3b8;color:#475569}
[draggable=true]{cursor:grab}[draggable=true]:active{cursor:grabbing}
.rg-add-group-btn{font-size:9px;padding:4px 10px;border:1px dashed #cbd5e1;border-radius:6px;
  background:none;cursor:pointer;color:#94a3b8;margin-top:6px;display:inline-block}
.rg-add-group-btn:hover{border-color:#94a3b8;color:#475569;background:#f8fafc}

/* ── ELEMENT CARDS ── */
.el-card{width:138px;border-radius:8px;padding:8px 10px;cursor:pointer;overflow:hidden;
  transition:transform .1s,box-shadow .1s;position:relative;background:#fff}
.el-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.el-card.selected{box-shadow:0 0 0 3px #3b82f6 !important}
.el-card.done       {border:2px solid var(--el-color,#94a3b8)}
.el-card.in_progress{border:2px solid #f59e0b;background:#fffbeb}
.el-card.planned    {border:2px dotted #cbd5e1;background:#f8fafc;opacity:.75}
.el-card.dimmed{opacity:.2;pointer-events:none}
.el-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:6px 6px 0 0;background:var(--el-color,#94a3b8)}
.p-name{font-size:12px;font-weight:700;color:#1e293b;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-desc{font-size:10px;color:#64748b;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-status-icon{position:absolute;top:6px;right:7px;font-size:11px;font-weight:700}
.p-rep-footer{font-size:8.5px;color:#64748b;margin-top:5px;padding-top:4px;border-top:1px solid #f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rep-ok{color:#0891b2;font-weight:700}
.rep-fail{color:#d97706;font-weight:700}
.inline-link{color:#3b82f6;cursor:pointer;text-decoration:underline dotted}
.mention-dropdown{position:absolute;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);max-height:180px;overflow-y:auto;z-index:999;min-width:160px}
.mention-item{padding:5px 10px;font-size:12px;cursor:pointer}
.mention-item:hover,.mention-item.active{background:#f1f5f9}

/* ── SPINE ── */
.spine{margin:2px 0 6px;padding-left:22px}
.spine-line{width:3px;height:36px;background:linear-gradient(to bottom,#94a3b8,#cbd5e1);border-radius:2px}

/* ── DETAIL PANEL ── */
#panel{width:300px;min-width:200px;background:#fff;border-left:1px solid #e2e8f0;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:-2px 0 8px rgba(0,0,0,.06)}
#panel-top{padding:14px 16px;background:#1e3a5f;color:#fff;flex-shrink:0}
#panel-top h3{font-size:11px;font-weight:700;opacity:.6;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
/* ── TAG MANAGER (panel-top) ── */
#tag-manager .tm-pills{display:flex;flex-wrap:wrap;gap:6px}
.tm-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;
  font-size:10px;color:#fff;cursor:pointer;line-height:1.4;white-space:nowrap;flex:1 1 auto;justify-content:center;min-width:0}
.tm-pill.off{opacity:.3;text-decoration:line-through}
.tm-pill-label{cursor:text}
.tm-del{border:none;background:none;color:rgba(255,255,255,.45);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;margin-left:2px;flex-shrink:0}
.tm-del:hover{color:rgba(255,255,255,.9)}
.tm-palette{display:flex;gap:4px;flex-wrap:wrap;padding:2px 0 2px 15px}
.mp-sw{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.mp-sw.sel{border-color:#fff}.mp-sw:hover{opacity:.8}
.tm-add-section{margin-top:8px;border-top:1px solid rgba(255,255,255,.15);padding-top:8px}
.tag-add-inp{font-size:11px;padding:3px 7px;border:1px solid rgba(255,255,255,.2);border-radius:5px;
  background:rgba(255,255,255,.1);color:#fff;outline:none;flex:1}
.tag-add-inp::placeholder{color:rgba(255,255,255,.35)}
.tag-add-inp:focus{border-color:rgba(255,255,255,.4)}
.tm-add-btn{font-size:11px;padding:3px 8px;border:1px solid rgba(255,255,255,.25);border-radius:5px;
  background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-weight:700}
.tm-add-btn:hover{background:rgba(255,255,255,.2)}
/* Tag-Chips im Element-Detail */
.tag-add-chip{font-size:10px;padding:2px 7px;border-radius:10px;border:1px dashed;background:none;cursor:pointer;color:#94a3b8}
.tag-add-chip:hover{background:#f8fafc}
#detail-body{flex:1;overflow-y:auto;padding:16px}
.hint{font-size:11.5px;color:#94a3b8;font-style:italic;line-height:1.6;margin-top:8px}

/* ── DETAIL CONTENT ── */
.dh{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.dtitle{font-size:15px;font-weight:800;margin-bottom:6px;line-height:1.25}
.dbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;display:inline-block;margin-bottom:10px}
.ddesc{font-size:12px;color:#475569;line-height:1.6;margin-bottom:12px}

/* uniform section format */
.dsec{border-top:1px solid #f1f5f9;padding-top:10px;margin-top:10px}
.dsec-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dsec-title .rm-sec{font-size:10px;color:#cbd5e1;border:none;background:none;cursor:pointer;margin-left:auto;padding:0 2px}
.dsec-title .rm-sec:hover{color:#64748b}
.dsec-content{font-size:12px;color:#334155;line-height:1.6}

/* array list items */
.arr-item{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px}
.arr-item-text{flex:1;font-size:12px;color:#334155;line-height:1.5;padding:3px 5px;border-radius:4px;outline:none}
.arr-item-text:focus{background:#f0f9ff;outline:1px solid #bae6fd}
.arr-item-del{color:#cbd5e1;border:none;background:none;cursor:pointer;font-size:13px;padding:2px;line-height:1;flex-shrink:0;margin-top:2px}
.arr-item-del:hover{color:#64748b}
.add-arr-btn{font-size:10px;padding:3px 8px;border:1px dashed #cbd5e1;border-radius:5px;
  background:none;cursor:pointer;color:#94a3b8;margin-top:3px}
.add-arr-btn:hover{border-color:#94a3b8;color:#475569}

/* step items */
.step-item{display:flex;gap:7px;padding:4px 0;font-size:11.5px;color:#374151;border-bottom:1px solid #f8fafc}
.step-num{font-size:10px;color:#94a3b8;flex-shrink:0;width:16px;text-align:right;margin-top:2px}

/* inline editable */
.editable{border-radius:3px;outline:none;transition:background .1s;cursor:text;min-width:20px;display:inline-block;width:100%}
.editable:hover{background:rgba(59,130,246,.05)}
.editable:focus{background:rgba(59,130,246,.07);outline:1px solid rgba(59,130,246,.25);outline-offset:1px}

/* dep tags */
.dep-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;background:#f1f5f9;color:#475569;margin:2px 2px 0 0;cursor:pointer}
.dep-tag:hover{background:#e2e8f0}

/* status buttons */
.status-edit{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.st-btn{font-size:10px;padding:3px 9px;border-radius:8px;border:1px solid #e2e8f0;cursor:pointer;background:#fff;color:#475569;font-weight:600}
.st-btn:hover{background:#f1f5f9}
.st-btn.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f}

/* add section button */
.add-sec-btn{font-size:10px;padding:4px 10px;border:1px dashed #cbd5e1;border-radius:6px;
  background:none;cursor:pointer;color:#94a3b8;width:100%;margin-top:8px;text-align:center}
.add-sec-btn:hover{border-color:#94a3b8;color:#475569;background:#f8fafc}

/* ── REPLICATE UI ── */
.rep-dot-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.rep-type-tag{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;
  width:34px;padding:2px 4px;border-radius:3px;text-align:center;flex-shrink:0}
.rep-type-tag.bio{background:#dbeafe;color:#1d4ed8}
.rep-type-tag.tech{background:#f1f5f9;color:#475569}
.rep-dots-strip{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.rep-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.rep-dot.fail{background:transparent;border:1.5px solid #94a3b8}
.rep-counts{font-size:10px;color:#64748b;white-space:nowrap;min-width:44px;text-align:right}
.rep-add-btn{font-size:10px;padding:5px 10px;border-radius:6px;border:1px dashed #cbd5e1;
  cursor:pointer;background:#f8fafc;color:#475569;font-weight:600;width:100%;margin-top:7px;text-align:center}
.rep-add-btn:hover{background:#f1f5f9;border-color:#94a3b8}
.rep-form{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-top:8px}
.rep-form-row{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.rf-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid #e2e8f0}
.rf-opt{font-size:10px;padding:4px 10px;cursor:pointer;background:#fff;color:#475569;font-weight:600;border:none}
.rf-opt.sel{background:#1e3a5f;color:#fff}
.rf-note-input{width:100%;font-size:11px;padding:5px 8px;border:1px solid #e2e8f0;border-radius:5px;outline:none;font-family:inherit}
.rf-note-input:focus{border-color:#3b82f6}
.rf-date-row{display:flex;gap:6px;align-items:center}
.rf-date-label{font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;white-space:nowrap}
.rf-date-input{font-size:11px;padding:4px 8px;border:1px solid #e2e8f0;border-radius:5px;outline:none;flex:1}
.rep-form-actions{display:flex;gap:6px;margin-top:7px}
.rf-submit{font-size:10px;padding:5px 14px;border-radius:6px;border:none;cursor:pointer;background:#1e3a5f;color:#fff;font-weight:700}
.rf-submit:hover{background:#1e40af}
.rf-cancel{font-size:10px;padding:5px 10px;border-radius:6px;border:1px solid #e2e8f0;cursor:pointer;background:#fff;color:#475569;font-weight:600}
.rep-list{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.rep-item{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#f8fafc;border-radius:5px;font-size:10.5px}
.rep-item-result{font-weight:800;width:14px;text-align:center;flex-shrink:0}
.rep-item-ok{color:#0891b2}
.rep-item-fail{color:#d97706}
.rep-item-note{flex:1;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rep-item-date{color:#94a3b8;font-size:9.5px;flex-shrink:0;white-space:nowrap}
.rep-item-del{color:#cbd5e1;cursor:pointer;font-size:13px;flex-shrink:0;border:none;background:none;padding:0 2px;line-height:1}
.rep-item-del:hover{color:#64748b}

/* ── TODO MODAL ── */
#todo-modal{display:none;position:fixed;inset:0;z-index:100}
#todo-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45)}
#todo-dialog{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:520px;max-width:95vw;max-height:85vh;background:#fff;border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
#todo-hdr{background:#1e3a5f;color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#todo-hdr h2{font-size:14px;font-weight:800;flex:1}
.todo-close{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;cursor:pointer;
  width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.todo-close:hover{background:rgba(255,255,255,.25)}
#todo-body{flex:1;overflow-y:auto;padding:18px}
.todo-tabs{display:flex;border-bottom:2px solid #f1f5f9;margin:-18px -18px 16px;padding:0 18px}
.todo-tab{padding:12px 16px;font-size:11px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:#94a3b8;margin-bottom:-2px}
.todo-tab.active{color:#1e3a5f;border-bottom-color:#1e3a5f}
.todo-section{margin-bottom:18px}
.todo-section-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#94a3b8;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #f1f5f9}
.todo-status-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
.tsr-icon{font-size:14px;width:20px;text-align:center}
.tsr-label{flex:1;font-weight:600;color:#334155}
.tsr-badge{font-size:10px;padding:2px 8px;border-radius:8px}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;
  margin-bottom:5px;background:#f8fafc;border:1px solid #f1f5f9}
.todo-cb{width:16px;height:16px;border-radius:4px;border:2px solid #cbd5e1;flex-shrink:0;
  margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;background:#fff;cursor:pointer}
.todo-item.done .todo-cb{background:#0891b2;border-color:#0891b2}
.todo-text{font-size:12px;color:#334155;line-height:1.5;flex:1;cursor:pointer}
.todo-item.done .todo-text{text-decoration:line-through;color:#94a3b8}
.todo-undo{font-size:9.5px;color:#94a3b8;cursor:pointer;border:none;background:none;text-decoration:underline;flex-shrink:0}
.todo-item-del{color:#cbd5e1;cursor:pointer;font-size:14px;border:none;background:none;padding:0 3px;line-height:1;flex-shrink:0}
.todo-item-del:hover{color:#64748b}
.todo-empty{font-size:12px;color:#94a3b8;font-style:italic;text-align:center;padding:20px 0}
.todo-add-row{display:flex;gap:6px;margin-top:12px}
.todo-add-input{flex:1;font-size:11.5px;padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;outline:none;font-family:inherit}
.todo-add-input:focus{border-color:#3b82f6}
.todo-add-btn{font-size:11px;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;background:#1e3a5f;color:#fff;font-weight:700;white-space:nowrap}

/* ── ADD NODE MODAL ── */
#add-modal{display:none;position:fixed;inset:0;z-index:100}
#add-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45)}
#add-dialog{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:440px;max-width:95vw;background:#fff;border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
#add-hdr{background:#1e3a5f;color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px}
#add-hdr h2{font-size:14px;font-weight:800;flex:1}
#add-body{padding:18px;display:flex;flex-direction:column;gap:10px}
.add-field label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;display:block;margin-bottom:4px}
.add-field input,.add-field select,.add-field textarea{
  width:100%;font-size:12px;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;
  outline:none;font-family:inherit;color:#334155}
.add-field input:focus,.add-field select:focus,.add-field textarea:focus{border-color:#3b82f6}
.add-field textarea{resize:vertical;min-height:60px}
.add-type-row{display:flex;gap:6px;margin-bottom:2px}
.add-type-btn{flex:1;padding:7px;border-radius:6px;border:1px solid #e2e8f0;cursor:pointer;
  font-size:11px;font-weight:700;background:#fff;color:#475569}
.add-type-btn.sel{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
#add-footer{display:flex;gap:8px;padding:14px 18px;border-top:1px solid #f1f5f9;justify-content:flex-end}
.add-confirm-btn{font-size:11px;padding:7px 18px;border-radius:7px;border:none;cursor:pointer;background:#1e3a5f;color:#fff;font-weight:700}
.add-cancel-btn{font-size:11px;padding:7px 14px;border-radius:7px;border:1px solid #e2e8f0;cursor:pointer;background:#fff;color:#475569;font-weight:600}

/* ── TAG CHIPS (Element-Detail) ── */
.tag-bar{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag-chip{font-size:10px;padding:2px 8px;border-radius:10px;display:flex;align-items:center;gap:3px;border:1px solid #e2e8f0;background:#f8fafc;color:#475569}
.tag-chip .tag-rm{border:none;background:none;cursor:pointer;font-size:11px;padding:0 0 0 2px;line-height:1;color:inherit;opacity:.6}
.tag-chip .tag-rm:hover{opacity:1}


/* ── PHASE 5: GOAL MANAGEMENT ── */
#roadmap-header{display:flex;align-items:center;padding:0 0 12px 0;gap:8px}
#roadmap-header span{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#94a3b8}
#goal-list{display:flex;flex-direction:column;gap:0}
.goal-abandon-btn{font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid #fecaca;background:#fff;color:#dc2626;cursor:pointer;margin-left:6px}
.goal-abandon-btn:hover{background:#fef2f2}

/* ── PHASE 6: INLINE EDITING ── */
.inline-actions{display:none;align-items:center;gap:3px;margin-left:auto}
.goal-header:hover .inline-actions{display:flex}
.ia-btn{font-size:11px;padding:2px 6px;border-radius:4px;border:none;background:rgba(0,0,0,.07);cursor:pointer;color:#475569;line-height:1.4}
.ia-btn:hover{background:rgba(0,0,0,.13)}
.ia-btn.danger{color:#dc2626;background:rgba(220,38,38,.08)}
.ia-btn.danger:hover{background:rgba(220,38,38,.15)}
.el-card{position:relative}
.card-abandon{position:absolute;top:4px;right:4px;font-size:10px;padding:1px 5px;border-radius:4px;border:none;background:rgba(220,38,38,.1);color:#dc2626;cursor:pointer;display:none;line-height:1.4;z-index:2}
.el-card:hover .card-abandon{display:block}

/* ── PHASE 7: ELEMENT PICKER ── */
#el-picker{display:none;position:fixed;z-index:300;background:#fff;border-radius:10px;
  box-shadow:0 8px 30px rgba(0,0,0,.18);border:1px solid #e2e8f0;width:240px;overflow:hidden}
.picker-search{width:100%;font-size:12px;padding:8px 12px;border:none;border-bottom:1px solid #f1f5f9;outline:none;font-family:inherit}
.picker-list{max-height:200px;overflow-y:auto}
.picker-item{padding:7px 12px;font-size:12px;cursor:pointer;color:#334155;display:flex;align-items:center;gap:6px}
.picker-item:hover{background:#f0f9ff}
.picker-item-label{font-weight:700}
.picker-item-desc{font-size:10px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.backbone-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:8px;background:#f1f5f9;color:#334155;cursor:pointer;border:none}
.backbone-chip:hover{background:#e2e8f0}
.backbone-chip .chip-nav{color:#3b82f6;font-size:10px}
.backbone-clear{border:none;background:none;cursor:pointer;color:#cbd5e1;font-size:13px;padding:0 2px;line-height:1}
.backbone-clear:hover{color:#64748b}
.dep-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:8px;background:#f1f5f9;color:#334155;margin:2px 2px 0 0}
.dep-chip-nav{cursor:pointer;color:#475569;font-weight:700;background:none;border:none;padding:0;font-size:11px}
.dep-chip-nav:hover{color:#3b82f6}
.dep-chip-rm{border:none;background:none;cursor:pointer;color:#cbd5e1;font-size:12px;padding:0 0 0 2px;line-height:1}
.dep-chip-rm:hover{color:#64748b}
</style>
</head>
<body>

<div id="hdr">
  <h1>ResearchGraph</h1>
  <div class="spacer"></div>
  <span class="pill p-done" id="cnt-done" onclick="toggleStatusFilter('done')">– done</span>
  <span class="pill p-wip"  id="cnt-wip" onclick="toggleStatusFilter('in_progress')">– in progress</span>
  <span class="pill p-open" id="cnt-open" onclick="toggleStatusFilter('planned')">– planned</span>
  <button class="hdr-btn" onclick="openTodo()">📋 Tasks</button>
  <button class="hdr-btn" onclick="exportData()">⬇ Export</button>
  <button class="hdr-btn" onclick="importData()">⬆ Import</button>
  <button class="hdr-btn" style="background:rgba(220,38,38,.3)" onclick="resetAll()">⟳ Reset</button>
  <button class="hdr-btn" id="gh-btn" style="background:rgba(255,255,255,.22)" onclick="ghAction()">⬡ GitHub</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
</div>

<div id="gh-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:28px;max-width:360px;text-align:center;color:#1e293b">
    <h3 style="margin-bottom:12px" id="gh-modal-title">Connect GitHub</h3>
    <p style="margin-bottom:16px;font-size:13px;color:#64748b" id="gh-modal-msg"></p>
    <div id="gh-modal-code" style="font-size:28px;font-weight:800;letter-spacing:4px;margin:16px 0;display:none"></div>
    <a id="gh-modal-link" href="#" target="_blank" style="display:none;color:#3b82f6;font-size:13px">Open GitHub to enter code →</a>
    <div style="margin-top:16px"><button class="hdr-btn" style="background:#e2e8f0;color:#1e293b" onclick="closeGhModal()">Close</button></div>
  </div>
</div>

<div id="main">
  <div id="roadmap">
    <div id="roadmap-header">
      <span>Goals</span>
      <button class="add-arr-btn" onclick="addGoal()">+ Add Goal</button>
    </div>
    <div id="goal-list"></div>
  </div>
  <div id="drag-divider"></div>
  <div id="panel">
    <div id="panel-top">
      <h3>Tags</h3>
      <div id="tag-manager"></div>
    </div>
    <div id="detail-body">
      <p class="hint">Click a goal or element for details.</p>
    </div>
  </div>
</div>

<div id="todo-modal">
  <div id="todo-backdrop" onclick="closeTodo()"></div>
  <div id="todo-dialog">
    <div id="todo-hdr"><h2>📋 Tasks & Progress</h2><button class="todo-close" onclick="closeTodo()">×</button></div>
    <div id="todo-body"></div>
  </div>
</div>

<div id="add-modal">
  <div id="add-backdrop" onclick="closeAddModal()"></div>
  <div id="add-dialog">
    <div id="add-hdr"><h2 id="add-title">New Element</h2><button class="todo-close" onclick="closeAddModal()">×</button></div>
    <div id="add-body"></div>
    <div id="add-footer">
      <button class="add-cancel-btn" onclick="closeAddModal()">Cancel</button>
      <button class="add-confirm-btn" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>


<!-- Phase 7: Element Picker -->
<div id="el-picker">
  <input class="picker-search" id="picker-search-inp" placeholder="Suchen…" oninput="filterPicker()" onkeydown="if(event.key==='Escape')closePicker()" />
  <div class="picker-list" id="picker-list-inner"></div>
</div>

<script>
// ─── DEFAULT DATA ─────────────────────────────────────────────────────────────
// Goals: jedes Goal hat groups[] mit Ebene-1 und optional Ebene-2 Gruppen
const _DG = [];

const _DE = [];

// ─── LOAD / SAVE STATE ───────────────────────────────────────────────────────
function _load(key, def){ try{return JSON.parse(localStorage.getItem(key))||def;}catch{return def;} }
function saveState(){
  localStorage.setItem('rg_elements',JSON.stringify(ELEMENTS));
  localStorage.setItem('rg_goals',JSON.stringify(GOALS));
}
function saveTags(){
  localStorage.setItem('rg_tags',JSON.stringify(TAGS));
}

// Migration: alte getrennte Keys → unified ELEMENTS
const _migratedEls=(function(){
  const saved=localStorage.getItem('rg_elements');
  if(saved) return JSON.parse(saved);
  const oldP=localStorage.getItem('rg_plasmids'), oldW=localStorage.getItem('rg_workflows');
  if(oldP||oldW){
    const merged=[...(oldP?JSON.parse(oldP):[]),...(oldW?JSON.parse(oldW):[])];
    localStorage.removeItem('rg_plasmids');localStorage.removeItem('rg_workflows');
    return merged;
  }
  return null;
})();
const ELEMENTS = _migratedEls || _DE;
const GOALS    = _load('rg_goals', _DG);
const TODOS    = _load('rg_todos', []);
let TAGS = _load('rg_tags', {});

// ─── MIGRATION: alte ap-basierte Daten → neues Gruppen+Tag-System ─────────────
(function migrate(){
  GOALS.forEach(g=>{
    if(!g.groups){
      const aps=[...new Set(ELEMENTS.filter(x=>x.goal===g.id).map(x=>x.ap).filter(Boolean))];
      g.groups=aps.map((ap,i)=>({id:'grp_'+g.id+'_'+ap,label:(TAGS[ap]?.label)||ap,parentId:null,order:i}));
      if(!g.groups.length) g.groups=[{id:'grp_'+g.id+'_default',label:'Standard',parentId:null,order:0}];
    }
  });
  ELEMENTS.forEach(x=>{
    if(!x.groupId && x.ap) x.groupId='grp_'+x.goal+'_'+x.ap;
    if(!x.groupId){const g=GOALS.find(g=>g.id===x.goal);x.groupId=g?.groups?.[0]?.id||null;}
    if(!x.tags||!x.tags.length||x.tags.every(t=>t==='Plasmid'||t==='Workflow')){x.tags=x.ap?[x.ap]:[];}
    delete x.ap;
  });
})();

// Status-Migration: spezifische → generische Status
(function migrateStatus(){
  const map={verified:'done',in_cloning:'in_progress',seq_needed:'in_progress'};
  [...ELEMENTS,...GOALS].forEach(x=>{if(map[x.status])x.status=map[x.status];});
})();

// Fehlende Array-Felder auf alten gespeicherten Daten sicherstellen
[...ELEMENTS,...GOALS].forEach(x=>{ if(!x.custom) x.custom=[]; if(!x.replicates) x.replicates=[]; });

// ─── STATE ───────────────────────────────────────────────────────────────────
const hiddenTags = new Set();
const collapsedGoals   = new Set(_load('rg_cGoals',[]));
const collapsedRgGroups = new Set(_load('rg_cGrp',[]));
let selType=null, selId=null;
let repFormTarget=null, repFormState={type:'bio',result:'success'};
let todoTab='open';

// Farbpalette (geteilt zwischen Tag-Manager und Card-Picker)
const COLOR_PALETTE=['#3b82f6','#0891b2','#d97706','#7c3aed','#94a3b8','#16a34a','#dc2626','#db2777'];
let _tmOpenPalette=null;  // Tag-Key, dessen Mini-Palette offen ist
let _newTagColor=COLOR_PALETTE[0];

// DnD
let _dragType=null, _dragId=null;

// Element-Picker
let _pickerMode=null,_pickerTarget=null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function statusIcon(s){
  const m={done:{icon:'✓',text:'done'},
    in_progress:{icon:'⟳',text:'in progress'},planned:{icon:'○',text:'planned'},
    abandoned:{icon:'✕',text:'abandoned'}};
  return m[s]||{icon:'·',text:s};
}
function getItem(type,id){
  if(type==='element') return ELEMENTS.find(x=>x.id===id);
  if(type==='goal') return GOALS.find(x=>x.id===id);
}
function goalStatusChips(goalId){
  const items=ELEMENTS.filter(p=>p.goal===goalId&&p.status!=='abandoned');
  const v=items.filter(x=>x.status==='done').length;
  const w=items.filter(x=>x.status==='in_progress').length;
  const o=items.filter(x=>x.status==='planned').length;
  return [v?`<span class="sc sc-v">✓ ${v}</span>`:'',w?`<span class="sc sc-w">⟳ ${w}</span>`:'',o?`<span class="sc sc-o">○ ${o}</span>`:''].filter(Boolean).join('');
}
function groupSummaryChips(grpId){
  const items=ELEMENTS.filter(p=>p.groupId===grpId&&p.status!=='abandoned');
  const v=items.filter(x=>x.status==='done').length;
  const w=items.filter(x=>x.status==='in_progress').length;
  const o=items.filter(x=>x.status==='planned').length;
  return [v?`<span class="ag-s ag-s-v">✓${v}</span>`:'',w?`<span class="ag-s ag-s-w">⟳${w}</span>`:'',o?`<span class="ag-s ag-s-o">○${o}</span>`:''].filter(Boolean).join('');
}
function getElementColor(el){
  for(const t of (el.tags||[])){
    if(TAGS[t]) return TAGS[t].color;
  }
  return '#94a3b8';
}
function repFooterHTML(reps){
  if(!reps||!reps.length) return '';
  const bio=reps.filter(r=>r.type==='bio'), tech=reps.filter(r=>r.type==='tech');
  const parts=[];
  if(bio.length){const ok=bio.filter(r=>r.result==='success').length,fail=bio.length-ok;parts.push(`Bio: ${ok?`<span class="rep-ok">✓${ok}</span>`:''}${fail?` <span class="rep-fail">✗${fail}</span>`:''}`);}
  if(tech.length){const ok=tech.filter(r=>r.result==='success').length,fail=tech.length-ok;parts.push(`Tech: ${ok?`<span class="rep-ok">✓${ok}</span>`:''}${fail?` <span class="rep-fail">✗${fail}</span>`:''}`);}
  return parts.join(' · ');
}

// ─── INLINE LINKING (@Mention) ────────────────────────────────────────────────
function renderInlineLinks(html){
  const allLabels=[...ELEMENTS,...GOALS].map(x=>x.label);
  return html.replace(/@([\w\-()]+)/g,(m,name)=>{
    const match=allLabels.find(l=>l===name);
    if(!match) return m;
    return `<span class="inline-link" onclick="event.stopPropagation();selectByLabel('${escH(name)}')">${m}</span>`;
  });
}
function selectByLabel(label){
  const el=ELEMENTS.find(x=>x.label===label);
  if(el){select('element',el.id);return;}
  const g=GOALS.find(x=>x.label===label);
  if(g) select('goal',g.id);
}

// @-Mention Dropdown für editierbare Felder
let _mentionState=null;
document.addEventListener('input',e=>{
  if(!e.target.isContentEditable) return;
  const text=e.target.innerText;
  const sel=window.getSelection();
  if(!sel.rangeCount) return;
  const range=sel.getRangeAt(0);
  const before=text.substring(0,range.startOffset);
  const atMatch=before.match(/@([\w\-()]*)$/);
  if(!atMatch){closeMentionDropdown();return;}
  const query=atMatch[1].toLowerCase();
  const items=[...ELEMENTS,...GOALS].filter(x=>x.label.toLowerCase().includes(query)).slice(0,8);
  if(!items.length){closeMentionDropdown();return;}
  showMentionDropdown(e.target,items,atMatch.index);
});
function showMentionDropdown(anchor,items,atPos){
  closeMentionDropdown();
  const dd=document.createElement('div');dd.className='mention-dropdown';dd.id='mention-dd';
  const rect=anchor.getBoundingClientRect();
  dd.style.top=(rect.bottom+2)+'px';dd.style.left=rect.left+'px';
  items.forEach((item,i)=>{
    const d=document.createElement('div');d.className='mention-item'+(i===0?' active':'');
    d.textContent=item.label;
    d.onmousedown=ev=>{ev.preventDefault();insertMention(anchor,item.label,atPos);};
    dd.appendChild(d);
  });
  document.body.appendChild(dd);
  _mentionState={anchor,items,atPos,idx:0};
}
function closeMentionDropdown(){
  const dd=document.getElementById('mention-dd');if(dd)dd.remove();
  _mentionState=null;
}
function insertMention(el,label,atPos){
  const text=el.innerText;
  el.innerText=text.substring(0,atPos)+'@'+label+' '+text.substring(text.indexOf(' ',atPos+1)<0?text.length:text.indexOf(' ',atPos+1));
  closeMentionDropdown();
  el.blur(); // triggers save
}
document.addEventListener('keydown',e=>{
  if(!_mentionState) return;
  const dd=document.getElementById('mention-dd');if(!dd) return;
  const items=dd.querySelectorAll('.mention-item');
  if(e.key==='ArrowDown'){e.preventDefault();_mentionState.idx=Math.min(_mentionState.idx+1,items.length-1);items.forEach((x,i)=>x.classList.toggle('active',i===_mentionState.idx));}
  else if(e.key==='ArrowUp'){e.preventDefault();_mentionState.idx=Math.max(_mentionState.idx-1,0);items.forEach((x,i)=>x.classList.toggle('active',i===_mentionState.idx));}
  else if(e.key==='Enter'&&_mentionState){e.preventDefault();const sel=items[_mentionState.idx];if(sel)sel.onmousedown(e);}
  else if(e.key==='Escape') closeMentionDropdown();
});
document.addEventListener('blur',()=>closeMentionDropdown(),true);

// ─── TAG MANAGER (ersetzt buildLegend) ────────────────────────────────────────
function buildTagManager(){
  const c=document.getElementById('tag-manager');c.innerHTML='';
  const pillsWrap=document.createElement('div');pillsWrap.className='tm-pills';
  Object.entries(TAGS).forEach(([key,cfg])=>{
    const isOff=hiddenTags.has(key);
    const pill=document.createElement('span');
    pill.className='tm-pill'+(isOff?' off':'');
    pill.style.background=cfg.color;
    pill.title='Filter ein/aus';
    pill.onclick=()=>toggleTagFilter(key);
    pill.innerHTML=`<span style="cursor:pointer" onclick="event.stopPropagation();toggleTmPalette('${key}')" title="Change color">●</span>
      <span class="tm-pill-label" onclick="event.stopPropagation();editTagLabel(this,'${key}')">${escH(cfg.label)}</span>
      <button class="tm-del" onclick="event.stopPropagation();deleteTag('${key}')" title="Tag löschen">×</button>`;
    pillsWrap.appendChild(pill);
  });
  c.appendChild(pillsWrap);
  // Farbpalette (falls offen für einen Tag)
  if(_tmOpenPalette&&TAGS[_tmOpenPalette]){
    const pal=document.createElement('div');pal.className='tm-palette';pal.style.marginTop='6px';
    COLOR_PALETTE.forEach(col=>{
      const sw=document.createElement('div');
      sw.className='mp-sw'+(TAGS[_tmOpenPalette].color===col?' sel':'');
      sw.style.background=col;
      sw.onclick=()=>setTagColor(_tmOpenPalette,col);
      pal.appendChild(sw);
    });
    c.appendChild(pal);
  }
  // Neuen Tag hinzufügen
  const addSec=document.createElement('div');addSec.className='tm-add-section';
  const palHTML=COLOR_PALETTE.map(col=>`<div class="mp-sw${_newTagColor===col?' sel':''}" style="background:${col}" data-col="${col}" onclick="setNewTagColor('${col}')"></div>`).join('');
  addSec.innerHTML=`
    <div style="display:flex;gap:5px">
      <input class="tag-add-inp" id="new-tag-inp" placeholder="New tag…"
        oninput="document.getElementById('new-tag-pal').style.display=this.value.trim()?'flex':'none'"
        onkeydown="if(event.key==='Enter')addNewTag()" />
      <button class="tm-add-btn" onclick="addNewTag()">+</button>
    </div>
    <div class="tm-palette" id="new-tag-pal" style="margin-top:5px;display:none">${palHTML}</div>`;
  c.appendChild(addSec);
}
function toggleTmPalette(key){_tmOpenPalette=(_tmOpenPalette===key)?null:key;buildTagManager();}
function setTagColor(key,color){if(TAGS[key])TAGS[key].color=color;_tmOpenPalette=null;saveTags();buildTagManager();buildRoadmap();}
function setNewTagColor(col){
  _newTagColor=col;
  document.querySelectorAll('#new-tag-pal .mp-sw').forEach(s=>s.classList.toggle('sel',s.dataset.col===col));
}
function toggleTagFilter(key){
  hiddenTags.has(key)?hiddenTags.delete(key):hiddenTags.add(key);
  buildTagManager();buildRoadmap();
}
function editTagLabel(span,key){
  span.contentEditable='true';span.focus();document.execCommand('selectAll',false,null);
  const save=()=>{
    span.contentEditable='false';
    const v=span.textContent.trim();
    if(v&&TAGS[key]){TAGS[key].label=v;saveTags();buildRoadmap();renderDetail();}
    else buildTagManager();
  };
  span.addEventListener('blur',save,{once:true});
  span.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();span.blur();}});
}
function deleteTag(key){
  if(!confirm(`Tag "${TAGS[key]?.label}" löschen? Wird auch von allen Elementen entfernt.`))return;
  ELEMENTS.forEach(el=>{el.tags=(el.tags||[]).filter(t=>t!==key);});
  delete TAGS[key];hiddenTags.delete(key);saveState();saveTags();buildTagManager();buildRoadmap();renderDetail();
}
function addNewTag(){
  const inp=document.getElementById('new-tag-inp');
  const label=(inp?.value||'').trim();if(!label)return;
  const key='tag_'+Date.now();
  TAGS[key]={label,color:_newTagColor};
  saveTags();inp.value='';buildTagManager();
}

// Element-Tags im Detail-Panel
function elementTagsHTML(type,id,tags){
  const chips=(tags||[]).map((t,i)=>{
    const cfg=TAGS[t];
    const col=cfg?.color||'#94a3b8';
    const lbl=cfg?.label||t;
    return `<span class="tag-chip" draggable="true" data-tag-idx="${i}" data-tag-type="${type}" data-tag-id="${id}"
      style="background:${col}22;border:1px solid ${col}55;color:${col};cursor:grab"
      ondragstart="onTagDragStart(event,${i})" ondragover="onTagDragOver(event)" ondrop="onTagDrop(event,'${type}','${id}',${i})">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${col};margin-right:3px;vertical-align:middle${i===0?';box-shadow:0 0 0 2px '+col+'22, 0 0 0 3.5px '+col:''}"></span>${escH(lbl)}<button class="tag-rm" style="color:${col}" onclick="removeElementTag('${type}','${id}',${i})">×</button></span>`;
  }).join('');
  const available=Object.entries(TAGS).filter(([k])=>!(tags||[]).includes(k))
    .map(([k,cfg])=>`<span class="tag-add-chip" style="color:${cfg.color};border-color:${cfg.color}66" onclick="addElementTag('${type}','${id}','${k}')">+ ${escH(cfg.label)}</span>`).join('');
  return `<div class="dsec"><div class="dsec-title">Tags <span style="font-size:9px;color:#94a3b8;font-weight:400">— first tag = color</span></div>
    <div class="tag-bar" style="margin-bottom:4px">${chips||'<span style="font-size:11px;color:#94a3b8">—</span>'}</div>
    ${available?`<div style="display:flex;flex-wrap:wrap;gap:4px">${available}</div>`:''}
  </div>`;
}
let _tagDragIdx=null;
function onTagDragStart(e,idx){_tagDragIdx=idx;e.dataTransfer.effectAllowed='move';}
function onTagDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function onTagDrop(e,type,id,targetIdx){
  e.preventDefault();if(_tagDragIdx===null||_tagDragIdx===targetIdx)return;
  const data=getItem(type,id);if(!data)return;
  const tag=data.tags.splice(_tagDragIdx,1)[0];
  data.tags.splice(targetIdx,0,tag);
  _tagDragIdx=null;saveState();buildRoadmap();renderDetail();
}
function removeElementTag(type,id,idx){
  const data=getItem(type,id);if(!data)return;
  data.tags.splice(idx,1);saveState();buildRoadmap();renderDetail();
}
function addElementTag(type,id,key){
  const data=getItem(type,id);if(!data)return;
  if(!data.tags)data.tags=[];
  if(!data.tags.includes(key))data.tags.push(key);
  saveState();buildRoadmap();renderDetail();
}

// ─── BUILD UI ─────────────────────────────────────────────────────────────────

function buildRoadmap(){
  const r=document.getElementById('goal-list');r.innerHTML='';
  GOALS.filter(g=>g.status!=='abandoned').forEach((goal,gi,filteredGoals)=>{
    const block=document.createElement('div');block.className='goal-block';
    const collapsed=collapsedGoals.has(goal.id);
    const chips=goalStatusChips(goal.id);
    const gh=document.createElement('div');
    gh.className=`goal-header ${goal.status==='done'?'goal-done':'goal-wip'}`;
    gh.dataset.type='goal';gh.dataset.id=goal.id;
    const si=statusIcon(goal.status);
    gh.innerHTML=`
      <button class="caret ${collapsed?'closed':''}" onclick="event.stopPropagation();toggleGoal('${goal.id}')" title="${collapsed?'Aufklappen':'Zuklappen'}">▾</button>
      <div class="goal-divider"></div>
      <div class="goal-icon">${goal.icon}</div>
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center">
        <div class="goal-title" id="gtitle-${goal.id}">${goal.label}</div>
        ${!collapsed?`<div class="goal-exp">${goal.experiment||''}</div>`:''}
      </div>
      <div class="goal-right">
        <div class="stat-chips">${chips}</div>
        <span class="pill ${goal.status==='done'?'p-done':'p-wip'}">${si.icon} ${si.text}</span>
        <div class="inline-actions">
          <button class="ia-btn" onclick="event.stopPropagation();inlineEditGoal('${goal.id}')" title="Umbenennen">✎</button>
          <button class="ia-btn" onclick="event.stopPropagation();openAddModal('${goal.id}')" title="Add element">+</button>
          <button class="ia-btn danger" onclick="event.stopPropagation();abandonGoal('${goal.id}')" title="Abandon">×</button>
        </div>
      </div>`;
    gh.addEventListener('click',()=>select('goal',goal.id));
    block.appendChild(gh);

    const body=document.createElement('div');body.className=`goal-body${collapsed?' hidden':''}`;
    // Level-1-Gruppen rendern
    const level1=(goal.groups||[]).filter(g=>!g.parentId).sort((a,b)=>a.order-b.order);
    level1.forEach(grp=>renderGroup(goal,grp,body,1));
    // Gruppe hinzufügen-Button
    const addGrpBtn=document.createElement('button');
    addGrpBtn.className='rg-add-group-btn';
    addGrpBtn.textContent='+ Group';
    addGrpBtn.onclick=()=>addGroupToGoal(goal.id);
    body.appendChild(addGrpBtn);
    block.appendChild(body);
    // Status-Filter: dimmen wenn Goal keine Elemente mit gefiltertem Status hat
    if(_statusFilter){
      const els=ELEMENTS.filter(p=>p.goal===goal.id&&p.status!=='abandoned');
      const hasMatch=els.some(x=>x.status===_statusFilter)||goal.status===_statusFilter;
      if(!hasMatch) block.classList.add('dimmed');
    }
    r.appendChild(block);
    if(gi<filteredGoals.length-1&&!collapsed){
      const spine=document.createElement('div');spine.className='spine';
      const line=document.createElement('div');line.className='spine-line';
      spine.appendChild(line);r.appendChild(spine);
    }
  });
  updateCounts();
  updateSelectionHighlight();
}

function renderGroup(goal,grp,container,depth){
  const groupEl=document.createElement('div');
  groupEl.className='rg-group depth-'+depth;
  groupEl.dataset.groupId=grp.id;
  groupEl.dataset.goalId=goal.id;
  const collapsed=collapsedRgGroups.has(grp.id);
  // Header
  const hdr=document.createElement('div');hdr.className='rg-group-hdr';
  hdr.innerHTML=`
    <button class="ag-caret${collapsed?' closed':''}" onclick="event.stopPropagation();toggleRgGroup('${grp.id}')">▾</button>
    <span class="rg-group-label">${escH(grp.label)}</span>
    <div class="ag-summary">${groupSummaryChips(grp.id)}</div>
    <div class="rg-group-actions">
      <button class="rg-group-btn" onclick="event.stopPropagation();openAddModal('${goal.id}')" title="Add element">+</button>
      <button class="rg-group-btn" onclick="event.stopPropagation();addGroupToGoal('${goal.id}','${grp.id}')" title="Sub-group">+Sub</button>
      <button class="rg-group-btn" onclick="event.stopPropagation();inlineEditGroupLabel('${goal.id}','${grp.id}')">✎</button>
      <button class="rg-group-btn danger" onclick="event.stopPropagation();deleteRgGroup('${goal.id}','${grp.id}')">×</button>
    </div>`;
  groupEl.appendChild(hdr);
  // Elemente-Zeile (Drop-Zone)
  const elRow=document.createElement('div');
  elRow.className='rg-el-row'+(collapsed?' hidden':'');
  elRow.dataset.groupId=grp.id;elRow.dataset.goalId=goal.id;
  elRow.addEventListener('dragover',onDragOver);
  elRow.addEventListener('dragleave',onDragLeave);
  elRow.addEventListener('drop',onDrop);
  // Elemente dieser Gruppe rendern
  const elements=ELEMENTS.filter(p=>p.groupId===grp.id&&p.status!=='abandoned');
  elements.forEach(el=>{
    if((el.tags||[]).some(t=>hiddenTags.has(t))) return;
    const card=makeElementCard(el);
    if(_statusFilter&&el.status!==_statusFilter) card.classList.add('dimmed');
    card.draggable=true;
    card.addEventListener('dragstart',e=>onDragStart(e,'element',el.id));
    elRow.appendChild(card);
  });
  groupEl.appendChild(elRow);
  // Sub-Gruppen (Ebene 2)
  const subs=(goal.groups||[]).filter(g=>g.parentId===grp.id).sort((a,b)=>a.order-b.order);
  subs.forEach(sub=>renderGroup(goal,sub,groupEl,depth+1));
  container.appendChild(groupEl);
}

function makeElementCard(el){
  const card=document.createElement('div');
  const si=statusIcon(el.status);
  const col=getElementColor(el);
  card.className=`el-card ${el.status}`;
  card.style.setProperty('--el-color',col);
  card.dataset.type='element';card.dataset.id=el.id;
  const repF=repFooterHTML(el.replicates);
  card.innerHTML=`<span class="p-status-icon" title="${si.text}">${si.icon}</span>
    <div class="p-name">${el.label}</div>
    <div class="p-desc">${el.desc||''}</div>
    ${repF?`<div class="p-rep-footer">${repF}</div>`:''}`;
  card.addEventListener('click',()=>select('element',el.id));
  return card;
}

// ─── DRAG & DROP ──────────────────────────────────────────────────────────────
function onDragStart(e,type,id){
  _dragType=type;_dragId=id;
  e.dataTransfer.effectAllowed='move';
}
function onDragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('dnd-over');
}
function onDragLeave(e){e.currentTarget.classList.remove('dnd-over');}
function onDrop(e){
  e.preventDefault();e.currentTarget.classList.remove('dnd-over');
  const targetGroupId=e.currentTarget.dataset.groupId;
  if(!_dragType||!_dragId||!targetGroupId)return;
  const data=getItem(_dragType,_dragId);
  if(data){data.groupId=targetGroupId;saveState();buildRoadmap();renderDetail();}
  _dragType=null;_dragId=null;
}

// ─── GRUPPEN-VERWALTUNG ────────────────────────────────────────────────────────
function addGroupToGoal(goalId,parentId=null){
  const g=GOALS.find(x=>x.id===goalId);if(!g)return;
  if(!g.groups)g.groups=[];
  const id='grp_'+Date.now();
  const siblings=g.groups.filter(x=>x.parentId===parentId);
  g.groups.push({id,label:'',parentId:parentId||null,order:siblings.length});
  saveState();buildRoadmap();
}
function deleteRgGroup(goalId,grpId){
  const g=GOALS.find(x=>x.id===goalId);if(!g)return;
  const others=g.groups.filter(x=>x.id!==grpId&&!x.parentId);
  if(!others.length){alert('Mindestens eine Hauptgruppe muss erhalten bleiben.');return;}
  const fallback=others[0];
  const subIds=g.groups.filter(x=>x.parentId===grpId).map(x=>x.id);
  const allIds=[grpId,...subIds];
  ELEMENTS.forEach(x=>{if(x.goal===goalId&&allIds.includes(x.groupId))x.groupId=fallback.id;});
  g.groups=g.groups.filter(x=>!allIds.includes(x.id));
  saveState();buildRoadmap();
}
function inlineEditGroupLabel(goalId,grpId){
  const labelEl=document.querySelector(`.rg-group[data-group-id="${grpId}"] .rg-group-label`);
  if(!labelEl)return;
  labelEl.contentEditable='true';labelEl.focus();document.execCommand('selectAll',false,null);
  const save=()=>{
    labelEl.contentEditable='false';
    const g=GOALS.find(x=>x.id===goalId);
    const grp=g?.groups?.find(x=>x.id===grpId);
    if(grp){grp.label=labelEl.textContent.trim();saveState();buildRoadmap();}
  };
  labelEl.addEventListener('blur',save,{once:true});
  labelEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();labelEl.blur();}});
}

// ─── COLLAPSE ─────────────────────────────────────────────────────────────────
function toggleGoal(goalId){
  collapsedGoals.has(goalId)?collapsedGoals.delete(goalId):collapsedGoals.add(goalId);
  localStorage.setItem('rg_cGoals',JSON.stringify([...collapsedGoals]));
  buildRoadmap();
}
function toggleRgGroup(grpId){
  collapsedRgGroups.has(grpId)?collapsedRgGroups.delete(grpId):collapsedRgGroups.add(grpId);
  localStorage.setItem('rg_cGrp',JSON.stringify([...collapsedRgGroups]));
  buildRoadmap();
}

// ─── SELECTION ────────────────────────────────────────────────────────────────
function select(type,id){
  if(selType===type&&selId===id){selType=null;selId=null;}
  else{selType=type;selId=id;}
  updateSelectionHighlight();
  renderDetail();
}
function updateSelectionHighlight(){
  document.querySelectorAll('.goal-header,.el-card').forEach(el=>el.classList.remove('selected'));
  if(selId) document.querySelectorAll(`[data-type="${selType}"][data-id="${selId}"]`).forEach(el=>el.classList.add('selected'));
}

// ─── INLINE EDIT HELPERS ─────────────────────────────────────────────────────
function ed(type,id,field,value,tag,extraClass){
  tag=tag||'div';extraClass=extraClass||'';
  return `<${tag} class="${extraClass} editable" contenteditable="true"
    data-type="${type}" data-id="${id}" data-field="${field}"
    onblur="saveField(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.blur()}"
    >${escH(value)}</${tag}>`;
}
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function saveField(el){
  const {type,id,field}=el.dataset;
  const data=getItem(type,id); if(!data)return;
  data[field]=el.innerText.trim();
  saveState();
  if(field==='label') buildRoadmap();
}
function saveArrField(el){
  const {type,id,field,idx}=el.dataset;
  const data=getItem(type,id); if(!data)return;
  data[field][parseInt(idx)]=el.innerText.trim();
  saveState();
}
function removeArrItem(type,id,field,idx){
  const data=getItem(type,id); if(!data)return;
  data[field].splice(idx,1);
  saveState(); renderDetail();
}
function addArrItem(type,id,field){
  const data=getItem(type,id); if(!data)return;
  if(!data[field]) data[field]=[];
  data[field].push('New entry');
  saveState(); renderDetail();
  setTimeout(()=>{
    const els=document.querySelectorAll(`[data-type="${type}"][data-id="${id}"][data-field="${field}"]`);
    if(els.length){const last=els[els.length-1];last.focus();document.execCommand('selectAll',false,null);}
  },30);
}
function arrListHTML(type,id,field,items,boxClass){
  if(!items) return '';
  return items.map((s,i)=>`
    <div class="arr-item">
      <div class="${boxClass} arr-item-text editable" contenteditable="true"
        data-type="${type}" data-id="${id}" data-field="${field}" data-idx="${i}"
        onblur="saveArrField(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.blur()}"
        >${escH(s)}</div>
      <button class="arr-item-del" onclick="removeArrItem('${type}','${id}','${field}',${i})">×</button>
    </div>`).join('');
}

// ─── CUSTOM SECTIONS ─────────────────────────────────────────────────────────
function addCustomSection(type,id){

  if(!data.custom) data.custom=[];
  data.custom.push({id:'cs_'+Date.now(),title:'New section',content:''});

function removeCustomSection(type,id,sid){

// ─── GRUPPE-DROPDOWN (Detail-Panel) ──────────────────────────────────────────
function gruppeDropdownHTML(type,id,groupId,goalId){
  const goal=GOALS.find(g=>g.id===goalId);
  if(!goal||!goal.groups?.length) return '';
  const sorted=[...(goal.groups||[])].sort((a,b)=>{
    if(!a.parentId&&b.parentId)return -1;
    if(a.parentId&&!b.parentId)return 1;
    return a.order-b.order;
  });
  const options=sorted.map(g=>`<option value="${g.id}"${g.id===groupId?' selected':''}>${g.parentId?'↳ ':''}${escH(g.label)}</option>`).join('');
  return `<div class="dsec"><div class="dsec-title">Group</div>
    <select style="width:100%;font-size:12px;padding:6px 8px;border:1px solid #e2e8f0;border-radius:6px;outline:none;color:#334155;cursor:pointer"
      onchange="changeGroup('${type}','${id}',this.value)">${options}</select></div>`;
}
function changeGroup(type,id,newGroupId){
  const data=getItem(type,id);if(!data)return;
  data.groupId=newGroupId;saveState();buildRoadmap();renderDetail();
}

// ─── GOAL MANAGEMENT ─────────────────────────────────────────────────────────
function addGoal(){
  const name=prompt('Goal name:');if(!name||!name.trim())return;
  const id='goal_'+Date.now();
  GOALS.push({id,label:name.trim(),status:'in_progress',icon:'🎯',desc:'',experiment:'',design_rationale:'',

    next:[],blockers:[],custom:[]});

}
function abandonGoal(goalId){
  if(!confirm('Mark goal as abandoned?'))return;
  const g=GOALS.find(x=>x.id===goalId);if(!g)return;

function abandonElement(type,id){

      }
      ${customSectionsHTML('goal',g.id,g.custom)}
      <button class="add-sec-btn" onclick="addCustomSection('goal','${g.id}')">+ New section</button>`;
  }

  else if(selType==='element'){
    const el=ELEMENTS.find(x=>x.id===selId);if(!el)return;
    const si=statusIcon(el.status);
    const elColor=getElementColor(el);
    const firstTagLabel=el.tags?.[0]?(TAGS[el.tags[0]]?.label||el.tags[0]):'';
    const statusBtns=['planned','in_progress','done'];
    body.innerHTML=`
      <div class="dh" style="color:${elColor}">Element${firstTagLabel?' · '+firstTagLabel:''}</div>
      ${ed('element',el.id,'label',el.label,'div','dtitle')}
      <span class="dbadge" style="background:#f1f5f9;color:#334155;border:2px solid ${elColor}">${si.icon} ${si.text}</span>
      <p class="ddesc editable" contenteditable="true"
        data-type="element" data-id="${el.id}" data-field="desc"
        onblur="saveField(this)">${renderInlineLinks(escH(el.desc))}</p>

      <div class="dsec"><div class="dsec-title">Status</div>
        <div class="status-edit">${statusBtns.map(s=>{const si2=statusIcon(s);
          return `<button class="st-btn ${el.status===s?'active':''}" onclick="changeElStatus('${el.id}','${s}')">${si2.icon} ${si2.text}</button>`;
        }).join('')}</div>
      </div>

      ${elementTagsHTML('element',el.id,el.tags||[])}
      ${repSectionHTML('element',el.id,el.replicates,elColor)}

      ${customSectionsHTML('element',el.id,el.custom)}
      <button class="add-sec-btn" onclick="addCustomSection('element','${el.id}')">+ New section</button>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="add-sec-btn" onclick="duplicateElement('${el.id}')">Duplicate</button>
        <button class="add-sec-btn danger" onclick="abandonElement('element','${el.id}')">Abandon</button>
      </div>`;
  }
}

// ─── REPLICATE SECTION ────────────────────────────────────────────────────────
function repSectionHTML(type,id,reps,apColor){
  const bio=reps.filter(r=>r.type==='bio'), tech=reps.filter(r=>r.type==='tech');
  const formOpen=(repFormTarget===id);
  const today=new Date().toISOString().slice(0,10);
  const makeDots=(list,col)=>list.map(r=>r.result==='success'
    ?`<span class="rep-dot" style="background:${col}" title="${r.date||''} Erfolg${r.note?' — '+r.note:''}"></span>`
    :`<span class="rep-dot fail" title="${r.date||''} Gescheitert${r.note?' — '+r.note:''}"></span>`).join('');
  const bioOk=bio.filter(r=>r.result==='success').length, bioFail=bio.length-bioOk;
  const techOk=tech.filter(r=>r.result==='success').length, techFail=tech.length-techOk;
  const dotRows=[
    bio.length?`<div class="rep-dot-row"><span class="rep-type-tag bio">Bio</span><div class="rep-dots-strip">${makeDots(bio,apColor)}</div><span class="rep-counts">${bioOk?`<span class="rep-ok">✓${bioOk}</span>`:''}${bioFail?` <span class="rep-fail">✗${bioFail}</span>`:''}</span></div>`:'',
    tech.length?`<div class="rep-dot-row"><span class="rep-type-tag tech">Tech</span><div class="rep-dots-strip">${makeDots(tech,'#475569')}</div><span class="rep-counts">${techOk?`<span class="rep-ok">✓${techOk}</span>`:''}${techFail?` <span class="rep-fail">✗${techFail}</span>`:''}</span></div>`:''
  ].filter(Boolean).join('');
  const formHTML=formOpen?`<div class="rep-form">
    <div class="rep-form-row">
      <div class="rf-toggle">
        <button class="rf-opt rf-type-opt ${repFormState.type==='bio'?'sel':''}" data-val="bio" onclick="setRepType('bio')">Biologisch</button>
        <button class="rf-opt rf-type-opt ${repFormState.type==='tech'?'sel':''}" data-val="tech" onclick="setRepType('tech')">Technisch</button>
      </div>
      <div class="rf-toggle">
        <button class="rf-opt rf-result-opt ${repFormState.result==='success'?'sel':''}" data-val="success" onclick="setRepResult('success')">✓ Erfolg</button>
        <button class="rf-opt rf-result-opt ${repFormState.result==='failed'?'sel':''}" data-val="failed" onclick="setRepResult('failed')">✗ Gescheitert</button>
      </div>
    </div>
    <div class="rep-form-row"><input class="rf-note-input" id="rf-note" type="text" placeholder="Kurze Notiz (optional)" /></div>
    <div class="rep-form-row rf-date-row"><span class="rf-date-label">Datum</span><input class="rf-date-input" id="rf-date" type="date" value="${today}" /></div>
    <div class="rep-form-actions">
      <button class="rf-submit" onclick="addRep('${type}','${id}')">Add</button>
      <button class="rf-cancel" onclick="cancelRepForm()">Cancel</button>
    </div></div>`:'';
  const listHTML=reps.length?`<div class="rep-list">${reps.map((r,i)=>`
    <div class="rep-item">
      <span class="rep-type-tag ${r.type}">${r.type==='bio'?'Bio':'Tech'}</span>
      <span class="rep-item-result ${r.result==='success'?'rep-item-ok':'rep-item-fail'}">${r.result==='success'?'✓':'✗'}</span>
      <span class="rep-item-note">${r.note||'—'}</span>
      <span class="rep-item-date">${r.date||''}</span>
      <button class="rep-item-del" onclick="deleteRep('${type}','${id}',${i})">×</button>
    </div>`).join('')}</div>`:'';
  return `<div class="dsec"><div class="dsec-title">Replicates${reps.length?` (${reps.length})`:' — none yet'}</div>
    ${dotRows}
    ${!formOpen?`<button class="rep-add-btn" onclick="toggleRepForm('${type}','${id}')">+ Add replicate</button>`:''}
    ${formHTML}${listHTML}
  </div>`;
}
function toggleRepForm(type,id){repFormTarget=(repFormTarget===id)?null:id;repFormState={type:'bio',result:'success'};renderDetail();}
function cancelRepForm(){repFormTarget=null;renderDetail();}
function setRepType(t){repFormState.type=t;document.querySelectorAll('.rf-type-opt').forEach(b=>b.classList.toggle('sel',b.dataset.val===t));}
function setRepResult(r){repFormState.result=r;document.querySelectorAll('.rf-result-opt').forEach(b=>b.classList.toggle('sel',b.dataset.val===r));}
function addRep(type,id){
  const data=getItem(type,id); if(!data)return;
  const note=(document.getElementById('rf-note')?.value||'').trim();
  const date=document.getElementById('rf-date')?.value||new Date().toISOString().slice(0,10);
  data.replicates.push({type:repFormState.type,result:repFormState.result,note,date});
  repFormTarget=null; saveState(); buildRoadmap(); renderDetail();
}
function deleteRep(type,id,idx){
  const data=getItem(type,id); if(!data)return;
  data.replicates.splice(idx,1); saveState(); buildRoadmap(); renderDetail();
}

// ─── STATUS CHANGE ────────────────────────────────────────────────────────────
function changeElStatus(elId,newStatus){
  const el=ELEMENTS.find(x=>x.id===elId); if(!el)return;
  el.status=newStatus; saveState(); buildRoadmap(); renderDetail();
}
let _statusFilter=null;
function updateCounts(){
  const all=[...ELEMENTS,...GOALS].filter(x=>x.status!=='abandoned');
  document.getElementById('cnt-done').textContent=`${all.filter(x=>x.status==='done').length} done`;
  document.getElementById('cnt-wip').textContent=`${all.filter(x=>x.status==='in_progress').length} in progress`;
  document.getElementById('cnt-open').textContent=`${all.filter(x=>x.status==='planned').length} planned`;
  // Active-Klasse auf Pills
  document.getElementById('cnt-done').classList.toggle('pill-active',_statusFilter==='done');
  document.getElementById('cnt-wip').classList.toggle('pill-active',_statusFilter==='in_progress');
  document.getElementById('cnt-open').classList.toggle('pill-active',_statusFilter==='planned');
}
function toggleStatusFilter(status){
  _statusFilter=(_statusFilter===status)?null:status;
  buildRoadmap();
}

// ─── ADD NEW NODE ─────────────────────────────────────────────────────────────
function _buildGroupOptions(goalId){
  const g=GOALS.find(x=>x.id===goalId);
  return (g?.groups||[]).map(grp=>`<option value="${grp.id}">${grp.parentId?'↳ ':''}${escH(grp.label)}</option>`).join('');
}
function openAddModal(preGoal){
  const activeGoal=preGoal||GOALS.filter(g=>g.status!=='abandoned')[0]?.id;
  const body=document.getElementById('add-body');
  body.innerHTML=`
    <div class="add-field"><label>Bezeichnung</label><input id="add-label" placeholder="z.B. Experiment-1" /></div>
    <div class="add-field"><label>Goal</label>
      <select id="add-goal" onchange="document.getElementById('add-grp').innerHTML=_buildGroupOptions(this.value)">
        ${GOALS.filter(g=>g.status!=='abandoned').map(g=>`<option value="${g.id}"${activeGoal===g.id?' selected':''}>${g.icon} ${g.label}</option>`).join('')}
      </select>
    </div>
    <div class="add-field"><label>Group</label>

    </div>
    <div class="add-field"><label>Description (optional)</label><textarea id="add-desc" rows="2"></textarea></div>`;

  document.getElementById('add-title').textContent='New Element';
  document.getElementById('add-label').focus();
}
function closeAddModal(){document.getElementById('add-modal').style.display='none';}
function confirmAdd(){
  const label=(document.getElementById('add-label')?.value||'').trim();
  if(!label)return;
  const goal=document.getElementById('add-goal')?.value||GOALS[0]?.id;
  const groupId=document.getElementById('add-grp')?.value||null;
  const desc=(document.getElementById('add-desc')?.value||'').trim();

}

// ─── TODO ─────────────────────────────────────────────────────────────────────
function saveTodos(){localStorage.setItem('rg_todos',JSON.stringify(TODOS));}
function openTodo(){document.getElementById('todo-modal').style.display='block';renderTodo();}
function closeTodo(){document.getElementById('todo-modal').style.display='none';}
function switchTodoTab(tab){todoTab=tab;renderTodo();}
function renderTodo(){
  const body=document.getElementById('todo-body');
  const open=TODOS.filter(t=>!t.done), done=TODOS.filter(t=>t.done);
  const list=todoTab==='open'?open:done;
  const statusRows=GOALS.filter(g=>g.status!=='abandoned').map(g=>{
    const si=statusIcon(g.status), chips=goalStatusChips(g.id);
    return `<div class="todo-status-row"><span class="tsr-icon">${g.icon}</span><span class="tsr-label">${g.label}</span>
      <span class="tsr-badge" style="background:${g.status==='done'?'#bfdbfe':'#fed7aa'};color:${g.status==='done'?'#1e3a8a':'#7c2d12'}">${si.icon} ${si.text}</span>
      <div style="display:flex;gap:3px">${chips}</div></div>`;
  }).join('');
  const itemsHTML=list.length?list.map(t=>`
    <div class="todo-item${t.done?' done':''}">
      <div class="todo-cb" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</div>
      <span class="todo-text" onclick="toggleTodo('${t.id}')">${escH(t.text)}</span>
      ${t.done?`<button class="todo-undo" onclick="toggleTodo('${t.id}')">rückgängig</button>`:''}
      <button class="todo-item-del" onclick="deleteTodo('${t.id}')">×</button>
    </div>`).join(''):`<div class="todo-empty">${todoTab==='open'?'No open tasks.':'Nothing completed yet.'}</div>`;
  body.innerHTML=`
    <div class="todo-tabs">
      <div class="todo-tab ${todoTab==='open'?'active':''}" onclick="switchTodoTab('open')">Offen (${open.length})</div>
      <div class="todo-tab ${todoTab==='done'?'active':''}" onclick="switchTodoTab('done')">Erledigt (${done.length})</div>
    </div>
    <div class="todo-section"><div class="todo-section-title">Projektstand</div>${statusRows}</div>
    <div class="todo-section">
      <div class="todo-section-title">${todoTab==='open'?'Tasks':'Completed'}</div>
      ${itemsHTML}
      ${todoTab==='open'?`<div class="todo-add-row">
        <input class="todo-add-input" id="todo-new-input" type="text" placeholder="New task…" onkeydown="if(event.key==='Enter')addTodo()" />
        <button class="todo-add-btn" onclick="addTodo()">+ Add</button>
      </div>`:''}
    </div>`;
  if(todoTab==='open') setTimeout(()=>document.getElementById('todo-new-input')?.focus(),50);
}
function toggleTodo(id){const t=TODOS.find(x=>x.id===id);if(!t)return;t.done=!t.done;saveTodos();renderTodo();}
function deleteTodo(id){const idx=TODOS.findIndex(x=>x.id===id);if(idx<0)return;TODOS.splice(idx,1);saveTodos();renderTodo();}
function addTodo(){
  const inp=document.getElementById('todo-new-input');
  const text=(inp?.value||'').trim();if(!text)return;
  TODOS.push({id:'t'+Date.now(),text,done:false});inp.value='';saveTodos();renderTodo();
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportData(){
  const data={elements:ELEMENTS,goals:GOALS,tags:TAGS,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='researchgraph_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function importData(){document.getElementById('import-file').click();}
function handleImport(e){
  const f=e.target.files[0];if(!f)return;
  if(!confirm('Imported data will overwrite current state. Continue?'))return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(d.elements)ELEMENTS.splice(0,Infinity,...d.elements);
      if(d.goals)GOALS.splice(0,Infinity,...d.goals);
      if(d.tags)Object.keys(TAGS).forEach(k=>delete TAGS[k]),Object.assign(TAGS,d.tags);
      saveState();saveTags();buildRoadmap();renderDetail();
    }catch(err){alert('Invalid JSON file: '+err.message);}
  };
  r.readAsText(f);e.target.value='';
}

// ─── GITHUB SYNC (Device Flow + Gist) ────────────────────────────────────────
const GH_CLIENT_ID='Ov23limUXGj7sIDx6kIb';
let ghToken=localStorage.getItem('rg_gh_token');
let ghGistId=localStorage.getItem('rg_gh_gist');
let ghUser=localStorage.getItem('rg_gh_user');
function updateGhBtn(){
  const btn=document.getElementById('gh-btn');
  if(ghToken) btn.textContent='⬡ '+ghUser;
  else btn.textContent='⬡ GitHub';
}
function ghAction(){
  if(ghToken){
    const c=confirm(`Logged in as ${ghUser}.\n\n• OK = Sync now\n• Cancel = Logout`);
    if(c) ghSave();
    else ghLogout();
  } else ghLogin();
}
function closeGhModal(){document.getElementById('gh-modal').style.display='none';}
function showGhModal(title,msg){
  document.getElementById('gh-modal-title').textContent=title;
  document.getElementById('gh-modal-msg').textContent=msg;
  document.getElementById('gh-modal-code').style.display='none';
  document.getElementById('gh-modal-link').style.display='none';
  document.getElementById('gh-modal').style.display='flex';
}
async function ghLogin(){
  showGhModal('Connect GitHub','Requesting device code...');
  try{
    const r=await fetch('https://github.com/login/device/code',{method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({client_id:GH_CLIENT_ID,scope:'gist'})});
    const d=await r.json();
    if(!d.user_code){showGhModal('Error',d.error_description||'Failed to get device code.');return;}
    document.getElementById('gh-modal-code').textContent=d.user_code;
    document.getElementById('gh-modal-code').style.display='block';
    document.getElementById('gh-modal-link').href=d.verification_uri;
    document.getElementById('gh-modal-link').style.display='inline';
    document.getElementById('gh-modal-msg').textContent='Enter this code on GitHub:';
    ghPoll(d.device_code,d.interval||5);
  }catch(e){showGhModal('Error','Network error: '+e.message);}
}
async function ghPoll(deviceCode,interval){
  const poll=async()=>{
    try{
      const r=await fetch('https://github.com/login/oauth/access_token',{method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({client_id:GH_CLIENT_ID,device_code:deviceCode,grant_type:'urn:ietf:params:oauth:grant-type:device_code'})});
      const d=await r.json();
      if(d.access_token){
        ghToken=d.access_token;localStorage.setItem('rg_gh_token',ghToken);
        const u=await fetch('https://api.github.com/user',{headers:{Authorization:'Bearer '+ghToken}});
        const ud=await u.json();ghUser=ud.login;localStorage.setItem('rg_gh_user',ghUser);
        updateGhBtn();
        await ghLoad();
        closeGhModal();return;
      }
      if(d.error==='authorization_pending') setTimeout(poll,(interval+1)*1000);
      else if(d.error==='slow_down') setTimeout(poll,(interval+6)*1000);
      else showGhModal('Error',d.error_description||d.error);
    }catch(e){showGhModal('Error','Poll error: '+e.message);}
  };
  setTimeout(poll,(interval+1)*1000);
}
async function ghSave(){
  if(!ghToken)return;
  const data=JSON.stringify({elements:ELEMENTS,goals:GOALS,tags:TAGS,saved:new Date().toISOString()},null,2);
  const files={'researchgraph_data.json':{content:data}};
  try{
    if(ghGistId){
      await fetch('https://api.github.com/gists/'+ghGistId,{method:'PATCH',
        headers:{Authorization:'Bearer '+ghToken,'Content-Type':'application/json'},
        body:JSON.stringify({files})});
    }else{
      const r=await fetch('https://api.github.com/gists',{method:'POST',
        headers:{Authorization:'Bearer '+ghToken,'Content-Type':'application/json'},
        body:JSON.stringify({description:'ResearchGraph data',public:false,files})});
      const d=await r.json();ghGistId=d.id;localStorage.setItem('rg_gh_gist',ghGistId);
    }
  }catch(e){console.error('Gist save error:',e);}
}
async function ghLoad(){
  if(!ghToken)return;
  if(!ghGistId){
    // suche existierenden Gist
    try{
      const r=await fetch('https://api.github.com/gists?per_page=100',{headers:{Authorization:'Bearer '+ghToken}});
      const gists=await r.json();
      const found=gists.find(g=>g.files['researchgraph_data.json']);
      if(found){ghGistId=found.id;localStorage.setItem('rg_gh_gist',ghGistId);}
    }catch(e){}
  }
  if(!ghGistId)return;
  try{
    const r=await fetch('https://api.github.com/gists/'+ghGistId,{headers:{Authorization:'Bearer '+ghToken}});
    const d=await r.json();
    const content=d.files['researchgraph_data.json']?.content;
    if(!content)return;
    const parsed=JSON.parse(content);
    if(parsed.elements)ELEMENTS.splice(0,Infinity,...parsed.elements);
    if(parsed.goals)GOALS.splice(0,Infinity,...parsed.goals);
    if(parsed.tags)Object.keys(TAGS).forEach(k=>delete TAGS[k]),Object.assign(TAGS,parsed.tags);
    saveState();saveTags();buildRoadmap();renderDetail();
  }catch(e){console.error('Gist load error:',e);}
}
function ghLogout(){
  ghToken=null;ghGistId=null;ghUser=null;
  localStorage.removeItem('rg_gh_token');localStorage.removeItem('rg_gh_gist');localStorage.removeItem('rg_gh_user');
  updateGhBtn();
}
// Auto-sync: nach jedem saveState auch zum Gist pushen
const _origSave=saveState;
saveState=function(){_origSave();ghSave();};

// ─── PHASE 8: FULL RESET ─────────────────────────────────────────────────────
function resetAll(){
  if(!confirm('Reset all data? This will delete all saved changes and load defaults.'))return;
  Object.keys(localStorage).filter(k=>k.startsWith('rg_')).forEach(k=>localStorage.removeItem(k));
  location.reload();
}

// ─── RESIZABLE PANEL ─────────────────────────────────────────────────────────
function initResizable(){
  const divider=document.getElementById('drag-divider');
  const panel=document.getElementById('panel');
  const saved=localStorage.getItem('rg_panelWidth');
  if(saved){panel.style.width=saved+'px';panel.style.minWidth=saved+'px';}
  divider.addEventListener('mousedown',e=>{
    e.preventDefault();
    divider.classList.add('dragging');
    const startX=e.clientX, startW=panel.offsetWidth;
    const onMove=e=>{
      const w=Math.max(200,Math.min(700,startW+startX-e.clientX));
      panel.style.width=w+'px';panel.style.minWidth=w+'px';
    };
    const onUp=()=>{
      divider.classList.remove('dragging');
      localStorage.setItem('rg_panelWidth',panel.offsetWidth);
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildTagManager();
buildRoadmap();
initResizable();
updateGhBtn();
if(ghToken)ghLoad();
